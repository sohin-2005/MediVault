

services:
  mysql:
    image: mysql:8
    container_name: mediavault-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mediavault
      MYSQL_USER: mediavault_user
      MYSQL_PASSWORD: mediavault_pass
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

  backend:
    build: ./backend
    container_name: mediavault-backend
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /code
    volumes:
      - ./backend:/code
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - mysql

volumes:
  dbdata:
